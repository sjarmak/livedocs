name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GORELEASER_CROSS_VERSION: v1.23.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Run GoReleaser with goreleaser-cross
        run: |
          docker run \
            --rm \
            --privileged \
            -e CGO_ENABLED=1 \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e HOMEBREW_TAP_GITHUB_TOKEN="${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/go/src/github.com/sjarmak/livedocs" \
            -w /go/src/github.com/sjarmak/livedocs \
            ghcr.io/goreleaser/goreleaser-cross:${GORELEASER_CROSS_VERSION} \
            release --clean
