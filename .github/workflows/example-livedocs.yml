name: Documentation Drift Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  livedocs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check documentation drift
        id: drift
        uses: ./
        with:
          # version: "v0.1.0"    # Pin to a specific version (default: latest)
          # path: "."             # Repository path to scan (default: .)
          # format: "json"        # Output format: text or json (default: json)
          fail-threshold: "0"     # Fail on any drift (default doc patterns exclude non-doc .md files)

      - name: Print drift summary
        if: always()
        run: |
          echo "Drift score: ${{ steps.drift.outputs.drift-score }}"
          echo "Stale references: ${{ steps.drift.outputs.total-stale }}"
          echo "Stale packages: ${{ steps.drift.outputs.total-stale-packages }}"
          echo "Undocumented exports: ${{ steps.drift.outputs.total-undocumented }}"
          echo "Has drift: ${{ steps.drift.outputs.has-drift }}"
