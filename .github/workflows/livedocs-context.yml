# Livedocs AI Context Pack — bootstrap variant for the livedocs repo itself.
#
# This builds livedocs from source (since the source IS this repo).
# The canonical user-facing workflow downloads a pre-built release binary instead.
# See examples/workflows/livedocs-prbot.yml for the version users install.

name: Livedocs AI context pack

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: livedocs-context-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  context-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # build-from-source + cold extraction

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # -- build from source (bootstrap — this IS the livedocs repo) ----------
      - name: Build livedocs
        run: |
          CGO_ENABLED=1 go build -o livedocs ./cmd/livedocs
          ./livedocs version
          mkdir -p ~/.livedocs-bin
          mv livedocs ~/.livedocs-bin/
          echo "$HOME/.livedocs-bin" >> "$GITHUB_PATH"

      # -- claims.db: cached per source-tree hash -----------------------------
      - name: Cache claims database
        id: db-cache
        uses: actions/cache@v4
        with:
          path: .livedocs
          key: livedocs-claims-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            livedocs-claims-${{ runner.os }}-

      - name: Extract claims
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .livedocs
          livedocs extract . -o .livedocs/claims.db

      # -- publish claims.db for agent consumption ----------------------------
      - name: Upload claims.db for agent consumption
        uses: actions/upload-artifact@v4
        with:
          name: livedocs-claims-pr-${{ github.event.pull_request.number }}
          path: .livedocs/claims.db
          retention-days: 14
          if-no-files-found: warn

      # -- PR diff + prbot ----------------------------------------------------
      - name: Compute PR diff
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --depth=50 origin "$BASE" "$HEAD" 2>/dev/null || true
          git diff --name-status "$BASE" "$HEAD" > /tmp/pr-diff.txt
          echo "Diff: $(wc -l </tmp/pr-diff.txt) files"

      - name: Run livedocs prbot
        run: |
          set -euo pipefail
          livedocs prbot \
            --db .livedocs/claims.db \
            --diff-file /tmp/pr-diff.txt \
            --format markdown \
            > /tmp/prbot.md || echo "_(livedocs prbot produced no output)_" > /tmp/prbot.md
          wc -l /tmp/prbot.md

      # -- post / update PR comment -------------------------------------------
      - name: Post context-pack comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const readOrEmpty = (p) => { try { return fs.readFileSync(p, 'utf8').trim(); } catch { return ''; } };
            const prbot = readOrEmpty('/tmp/prbot.md');

            const runId = context.runId;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const artifactHint =
              `_Agents: the full claims database is attached to this run as ` +
              `\`livedocs-claims-pr-${context.issue.number}\`. Download with ` +
              `\`gh run download ${runId} --repo ${repo} --name ` +
              `livedocs-claims-pr-${context.issue.number}\` and query via ` +
              `\`livedocs mcp --db claims.db\`._`;

            const body = [
              '<!-- livedocs-ai-context-pack v0 -->',
              '## AI context pack',
              '',
              prbot || '_No documentation-impact findings for this diff._',
              '',
              '---',
              artifactHint,
              '',
              '_Generated by [livedocs](https://github.com/live-docs/live_docs). React below to signal value._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot'
              && c.body.includes('<!-- livedocs-ai-context-pack v0 -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
