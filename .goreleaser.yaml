version: 2

project_name: livedocs

before:
  hooks:
    - go mod tidy

builds:
  - id: livedocs
    main: ./cmd/livedocs
    binary: livedocs
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    overrides:
      - goos: linux
        goarch: amd64
        goamd64: v1
        env:
          - CGO_ENABLED=1
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
      - goos: darwin
        goarch: amd64
        goamd64: v1
        env:
          - CGO_ENABLED=1
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=oa64-clang
          - CXX=oa64-clang++

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Cosign keyless signing of checksums.txt.
#
# checksums.txt already chains integrity to every archive (goreleaser writes
# sha256 of every tar.gz/zip into it), so signing just that one file is
# sufficient: consumers verify the cosign signature of checksums.txt, then
# verify each archive's sha256 against the verified checksums.txt.
#
# Keyless mode: cosign requests a short-lived signing certificate from Fulcio
# using the GitHub Actions OIDC token. No long-lived key material. The
# resulting signature + cert are recorded in the Rekor transparency log.
#
# Requires:
#   - cosign binary on PATH in the release execution environment
#     (installed on the host runner and bind-mounted into goreleaser-cross —
#     see .github/workflows/release.yml).
#   - permissions: id-token: write on the signing workflow so the runner can
#     fetch an OIDC token.
#   - ACTIONS_ID_TOKEN_REQUEST_TOKEN + ACTIONS_ID_TOKEN_REQUEST_URL passed
#     through to the container (see release.yml).
#
# Outputs alongside checksums.txt in the GitHub Release:
#   - checksums.txt.sig  (the signature)
#   - checksums.txt.pem  (the Fulcio-issued signing certificate)
signs:
  - id: checksums-cosign-keyless
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: livedocs
    repository:
      owner: sjarmak
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/sjarmak/livedocs"
    description: "Live documentation for codebases"
    binaries:
      - livedocs

release:
  github:
    owner: sjarmak
    name: livedocs
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
