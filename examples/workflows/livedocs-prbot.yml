# Livedocs AI Context Pack — minimal GitHub Actions plugin
#
# Drop this file into `.github/workflows/livedocs-context.yml` on your repo.
# On every PR it posts (or updates) a context-pack comment summarizing
# documentation impact from the PR diff.
#
# Zero external storage: uses GitHub Actions cache for the livedocs binary
# and the claims database. No GCS, no service accounts, no sidecar workers.
# No third-party LLM calls.
#
# Required: nothing — works out of the box on public and private repos.
# Optional secret:
#   SRC_ACCESS_TOKEN   — enables Sourcegraph semantic enrichment
#                        (cross-repo drift + semantic claim properties)
#
# Storage model:
#   - Binary cached by version; refetch only when livedocs upgrades
#   - claims.db cached per source-tree hash; restored if source unchanged
#   - On cache miss, full extraction runs (~2-5 min depending on repo size).
#     This is acceptable as a one-time cold-start cost per source-tree hash.
#   - PR comment is the only user-visible artifact; edited in place across
#     PR updates (no comment spam)

name: Livedocs AI context pack

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Uncomment to also refresh claims.db on main pushes (warms the cache):
  # push:
  #   branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: livedocs-context-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  context-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # cold extraction can take ~5 min; cache hit is <30s
    env:
      LIVEDOCS_VERSION: "latest"  # or pin a specific tag, e.g. "v0.3.0"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 50  # enough for diff + ancestry walks

      # -- binary: cache across runs; only refetch on version bump -----------
      - name: Cache livedocs binary
        id: bin-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.livedocs-bin
          key: livedocs-bin-${{ runner.os }}-${{ runner.arch }}-${{ env.LIVEDOCS_VERSION }}

      - name: Install livedocs
        if: steps.bin-cache.outputs.cache-hit != 'true'
        env:
          # Default token works because sjarmak/livedocs releases are public.
          # If the release repo ever goes private, users need a PAT with repo scope.
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p ~/.livedocs-bin

          if [ "$LIVEDOCS_VERSION" = "latest" ]; then
            VERSION=$(gh api repos/sjarmak/livedocs/releases/latest --jq '.tag_name')
          else
            VERSION="$LIVEDOCS_VERSION"
          fi
          VERSION_BARE="${VERSION#v}"

          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in x86_64) ARCH=amd64 ;; aarch64) ARCH=arm64 ;; esac

          # goreleaser publishes tar.gz on linux and zip on darwin — mirror that.
          case "$OS" in
            linux)  EXT="tar.gz" ;;
            darwin) EXT="zip" ;;
            *)
              echo "ERROR: Unsupported OS: $OS" >&2
              exit 1
              ;;
          esac

          ARCHIVE="livedocs_${VERSION_BARE}_${OS}_${ARCH}.${EXT}"

          # Download the archive and the release-wide checksums.txt from the
          # same release tag. goreleaser publishes a sha256 checksums.txt
          # covering every archive.
          gh release download "$VERSION" --repo sjarmak/livedocs \
            --pattern "$ARCHIVE" --pattern "checksums.txt" --dir /tmp

          # Verify integrity BEFORE extracting. Two guards are required:
          #   1. Our archive MUST be listed in checksums.txt. We assert this
          #      explicitly with `grep -F` — `sha256sum --ignore-missing` will
          #      silently return 0 if the file we care about is absent from
          #      the checksum list, which would be a bypass.
          #   2. `sha256sum -c` must confirm the hash matches. Under
          #      `set -euo pipefail` any non-zero exit aborts the job and the
          #      cache write, so an attacker-swapped tarball cannot poison
          #      downstream runs.
          #
          # --ignore-missing covers the expected case: the release-wide
          # checksums.txt lists archives for every os/arch, and we only
          # downloaded one.
          #
          # NOTE: This is an integrity check, not authenticity. A compromised
          # release repository could publish a matching tarball + checksum
          # together. For authenticity we'd need signed releases (cosign/GPG).
          if ! grep -qF "  ${ARCHIVE}" /tmp/checksums.txt; then
            echo "ERROR: ${ARCHIVE} is not listed in checksums.txt — refusing to install." >&2
            exit 1
          fi
          ( cd /tmp && sha256sum --ignore-missing -c checksums.txt )

          if [ "$EXT" = "tar.gz" ]; then
            tar -xzf "/tmp/$ARCHIVE" -C ~/.livedocs-bin livedocs
          else
            unzip -o "/tmp/$ARCHIVE" livedocs -d ~/.livedocs-bin
          fi
          chmod +x ~/.livedocs-bin/livedocs

      - name: Add livedocs to PATH
        run: echo "$HOME/.livedocs-bin" >> "$GITHUB_PATH"

      # -- claims.db: cached per source-tree hash, fall back to extract -----
      - name: Cache claims database
        id: db-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .livedocs
          # Keyed on source files — invalidates on any code change
          key: livedocs-claims-${{ runner.os }}-${{ hashFiles('**/*.go', '**/*.ts', '**/*.tsx', '**/*.py', '**/*.js', '**/*.jsx', '**/*.sh') }}
          restore-keys: |
            livedocs-claims-${{ runner.os }}-

      - name: Extract claims
        # On cache hit (source hash unchanged): skips entirely — claims.db already valid.
        # On cache miss: full extraction (~2-5 min). The prbot + comment steps
        # are sub-100ms regardless.
        run: |
          set -euo pipefail
          if [ -f .livedocs/claims.db ]; then
            echo "claims.db restored from cache — skipping extraction"
          else
            mkdir -p .livedocs
            livedocs extract . -o .livedocs/claims.db
          fi

      # -- optional: Sourcegraph semantic enrichment ------------------------
      - name: Enrich claims via Sourcegraph (optional)
        if: env.SRC_ACCESS_TOKEN != ''
        env:
          SRC_ACCESS_TOKEN: ${{ secrets.SRC_ACCESS_TOKEN }}
        continue-on-error: true  # non-fatal — enrichment is a nice-to-have
        run: |
          livedocs enrich --data-dir .livedocs/ || echo "enrichment skipped"

      # -- publish claims.db for interactive agent sessions ------------------
      # Humans read the rendered PR comment below. Agents running locally
      # (Claude Code / Amp / Cody / Cursor) can download this artifact and
      # query the claims DB directly via `livedocs mcp --db claims.db`, getting
      # access to the full structured claim surface — not just the rendered
      # markdown summary humans see.
      - name: Upload claims.db for agent consumption
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: livedocs-claims-pr-${{ github.event.pull_request.number }}
          path: .livedocs/claims.db
          retention-days: 14
          if-no-files-found: warn

      # -- PR diff + prbot --------------------------------------------------
      - name: Compute PR diff
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Ensure base SHA is fetched (checkout may be shallow)
          git fetch --no-tags --prune --depth=50 origin "$BASE" "$HEAD" 2>/dev/null || true
          git diff --unified "$BASE" "$HEAD" > /tmp/pr-diff.txt
          echo "Diff: $(wc -l </tmp/pr-diff.txt) lines"

      - name: Run livedocs prbot
        run: |
          set -euo pipefail
          livedocs prbot \
            --db .livedocs/claims.db \
            --diff-file /tmp/pr-diff.txt \
            --diff-format unified \
            --format markdown \
            > /tmp/prbot.md || echo "_(livedocs prbot produced no output)_" > /tmp/prbot.md
          wc -l /tmp/prbot.md

      # -- post / update PR comment -----------------------------------------
      - name: Post context-pack comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const readOrEmpty = (p) => { try { return fs.readFileSync(p, 'utf8').trim(); } catch { return ''; } };
            const prbot = readOrEmpty('/tmp/prbot.md');

            const runId = context.runId;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const artifactHint =
              `_Agents: the full claims database is attached to this run as ` +
              `\`livedocs-claims-pr-${context.issue.number}\`. Download with ` +
              `\`gh run download ${runId} --repo ${repo} --name ` +
              `livedocs-claims-pr-${context.issue.number}\` and query via ` +
              `\`livedocs mcp --db claims.db\`._`;

            const body = [
              '<!-- livedocs-ai-context-pack v0 -->',
              '## 📎 AI context pack',
              '',
              prbot || '_No documentation-impact findings for this diff._',
              '',
              '---',
              artifactHint,
              '',
              '_Generated by [livedocs](https://github.com/sjarmak/livedocs). React below to signal value._',
            ].join('\n');

            // Idempotent: edit the existing pack comment instead of posting a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot'
              && c.body.includes('<!-- livedocs-ai-context-pack v0 -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
