name: "Livedocs Check"
description: "Detect documentation drift in your repository using livedocs check"
author: "live-docs"

branding:
  icon: "file-text"
  color: "blue"

inputs:
  version:
    description: "Livedocs version to use (e.g., v0.1.0). Defaults to latest release."
    required: false
    default: "latest"
  path:
    description: "Repository path to check for documentation drift."
    required: false
    default: "."
  format:
    description: "Output format: text or json."
    required: false
    default: "json"
  fail-threshold:
    description: "Maximum allowed drift score (total stale + stale packages). Set to -1 to never fail."
    required: false
    default: "0"
  github-token:
    description: "GitHub token for downloading release assets. Defaults to the workflow token."
    required: false
    default: ${{ github.token }}
  badge-api-url:
    description: "Badge endpoint URL (e.g., https://livedocs-badge.example.workers.dev). If set, drift results are POSTed to update the badge."
    required: false
    default: ""
  badge-api-token:
    description: "Bearer token for authenticating with the badge API."
    required: false
    default: ""

outputs:
  drift-score:
    description: "Total drift score (stale references + stale packages)"
    value: ${{ steps.check.outputs.drift-score }}
  total-stale:
    description: "Number of stale symbol references"
    value: ${{ steps.check.outputs.total-stale }}
  total-stale-packages:
    description: "Number of stale package paths"
    value: ${{ steps.check.outputs.total-stale-packages }}
  total-undocumented:
    description: "Number of undocumented exports (informational)"
    value: ${{ steps.check.outputs.total-undocumented }}
  has-drift:
    description: "Whether structural drift was detected (true/false)"
    value: ${{ steps.check.outputs.has-drift }}

runs:
  using: "composite"
  steps:
    - name: Determine version
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if [ "$INPUT_VERSION" = "latest" ]; then
          VERSION=$(gh api repos/sjarmak/livedocs/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to determine latest livedocs release version"
            exit 1
          fi
        else
          VERSION="$INPUT_VERSION"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        # Strip leading v for archive name matching
        echo "version-bare=${VERSION#v}" >> "$GITHUB_OUTPUT"

    - name: Cache livedocs binary
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      id: bin-cache
      with:
        path: /usr/local/bin/livedocs
        key: livedocs-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    # Install cosign so we can verify the authenticity of checksums.txt
    # (signed at release time via GitHub Actions OIDC keyless signing —
    # see https://github.com/sjarmak/livedocs/blob/main/.goreleaser.yaml).
    # Without this we can only verify integrity (bytes match checksum),
    # not authenticity (checksum came from our release pipeline).
    - name: Install Cosign
      if: steps.bin-cache.outputs.cache-hit != 'true'
      uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5  # v3.10.1
      with:
        cosign-release: "v2.5.0"

    - name: Download livedocs binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ steps.version.outputs.version }}
        VERSION_BARE: ${{ steps.version.outputs.version-bare }}
      run: |
        set -euo pipefail

        if [ -x /usr/local/bin/livedocs ]; then
          echo "livedocs binary found in cache"
          exit 0
        fi

        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac

        case "$OS" in
          linux)  EXT="tar.gz" ;;
          darwin) EXT="zip" ;;
          *)
            echo "::error::Unsupported OS: $OS"
            exit 1
            ;;
        esac

        ARCHIVE="livedocs_${VERSION_BARE}_${OS}_${ARCH}.${EXT}"
        echo "Downloading $ARCHIVE from release $VERSION"

        # Download the archive, the release-wide checksums.txt, and the
        # cosign signature + certificate for checksums.txt from the same
        # release. goreleaser publishes a sha256 checksums.txt covering
        # every archive (linux tar.gz + darwin zip) AND a cosign keyless
        # signature over checksums.txt.
        gh release download "$VERSION" \
          --repo sjarmak/livedocs \
          --pattern "$ARCHIVE" \
          --pattern "checksums.txt" \
          --pattern "checksums.txt.sig" \
          --pattern "checksums.txt.pem" \
          --dir /tmp

        # Fail closed if the signing artifacts are missing from the release.
        # gh release download silently succeeds when a pattern matches zero
        # assets, so we must verify the files actually landed.
        for required in checksums.txt checksums.txt.sig checksums.txt.pem; do
          if [ ! -s "/tmp/$required" ]; then
            echo "::error::release $VERSION is missing $required — refusing to install."
            exit 1
          fi
        done

        # AUTHENTICITY: verify checksums.txt was signed by our release
        # pipeline (not some attacker who got write access to the release
        # repo and swapped both the tarball and the checksums.txt).
        #
        # --certificate-identity-regexp pins the signing identity to this
        # repo's release workflow on tag refs ONLY. Without this pin, any
        # cosign keyless signature from any GitHub workflow would validate
        # — an obvious bypass. The regex is anchored start ('^') and end
        # ('$') and only accepts refs/tags/v* (not branches, not PRs, not
        # namespaces an attacker could spoof on a fork).
        #
        # --certificate-oidc-issuer pins the issuer to GitHub's official
        # token service; there is exactly one correct value for GitHub-
        # hosted runners.
        #
        # If cosign verify-blob returns non-zero the step aborts (set -e)
        # BEFORE the integrity check, extraction, or sudo mv — there is no
        # fallback-to-unsigned path.
        cosign verify-blob \
          --certificate /tmp/checksums.txt.pem \
          --signature /tmp/checksums.txt.sig \
          --certificate-identity-regexp '^https://github\.com/sjarmak/livedocs/\.github/workflows/release\.yml@refs/tags/v.*$' \
          --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
          /tmp/checksums.txt

        # INTEGRITY: now that checksums.txt is authenticated, verify the
        # archive bytes match the signed checksum list. Two guards are
        # still required:
        #   1. Our archive MUST be listed in checksums.txt. Asserted
        #      explicitly with `grep -F` — `sha256sum --ignore-missing`
        #      silently returns 0 when the target is absent from the
        #      checksum list, which would be a bypass.
        #   2. `sha256sum -c` must confirm the hash matches. Under
        #      `set -euo pipefail` any non-zero exit aborts the step
        #      before `sudo mv`, so an attacker-swapped tarball never
        #      reaches /usr/local/bin.
        #
        # --ignore-missing is correct here: the release-wide checksums.txt
        # lists archives for every os/arch, and we only downloaded one.
        if ! grep -qF "  ${ARCHIVE}" /tmp/checksums.txt; then
          echo "::error::${ARCHIVE} is not listed in checksums.txt — refusing to install."
          exit 1
        fi
        ( cd /tmp && sha256sum --ignore-missing -c checksums.txt )

        if [ "$EXT" = "tar.gz" ]; then
          tar -xzf "/tmp/$ARCHIVE" -C /tmp livedocs
        else
          unzip -o "/tmp/$ARCHIVE" livedocs -d /tmp
        fi

        chmod +x /tmp/livedocs
        sudo mv /tmp/livedocs /usr/local/bin/livedocs
        rm -f "/tmp/$ARCHIVE" /tmp/checksums.txt /tmp/checksums.txt.sig /tmp/checksums.txt.pem

    - name: Cache claims database
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: .livedocs/claims.db
        key: livedocs-claims-${{ hashFiles('**/*.md') }}
        restore-keys: |
          livedocs-claims-

    - name: Run livedocs check
      id: check
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_THRESHOLD: ${{ inputs.fail-threshold }}
      run: |
        set +e
        OUTPUT=$(livedocs check --format json "$INPUT_PATH" 2>&1)
        set -e

        # Parse JSON output for drift metrics
        if echo "$OUTPUT" | jq -e '.total_stale' > /dev/null 2>&1; then
          TOTAL_STALE=$(echo "$OUTPUT" | jq -r '.total_stale')
          TOTAL_STALE_PKG=$(echo "$OUTPUT" | jq -r '.total_stale_packages')
          TOTAL_UNDOC=$(echo "$OUTPUT" | jq -r '.total_undocumented')
          HAS_DRIFT=$(echo "$OUTPUT" | jq -r '.has_drift')
          DRIFT_SCORE=$((TOTAL_STALE + TOTAL_STALE_PKG))
        else
          echo "::warning::Could not parse livedocs JSON output"
          echo "$OUTPUT"
          TOTAL_STALE=0
          TOTAL_STALE_PKG=0
          TOTAL_UNDOC=0
          HAS_DRIFT="false"
          DRIFT_SCORE=0
        fi

        echo "drift-score=$DRIFT_SCORE" >> "$GITHUB_OUTPUT"
        echo "total-stale=$TOTAL_STALE" >> "$GITHUB_OUTPUT"
        echo "total-stale-packages=$TOTAL_STALE_PKG" >> "$GITHUB_OUTPUT"
        echo "total-undocumented=$TOTAL_UNDOC" >> "$GITHUB_OUTPUT"
        echo "has-drift=$HAS_DRIFT" >> "$GITHUB_OUTPUT"

        # Display human-readable output if text format requested
        if [ "$INPUT_FORMAT" = "text" ]; then
          livedocs check --format text "$INPUT_PATH" 2>&1 || true
        else
          echo "$OUTPUT"
        fi

        # Upload JSON result as artifact metadata
        mkdir -p "$RUNNER_TEMP/livedocs"
        echo "$OUTPUT" > "$RUNNER_TEMP/livedocs/drift-report.json"

        # Threshold check
        if [ "$INPUT_THRESHOLD" != "-1" ] && [ "$DRIFT_SCORE" -gt "$INPUT_THRESHOLD" ]; then
          echo "::error::Drift score ($DRIFT_SCORE) exceeds threshold ($INPUT_THRESHOLD)"
          exit 1
        fi

    - name: Upload drift report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: livedocs-drift-report
        path: ${{ runner.temp }}/livedocs/drift-report.json
        retention-days: 30
        if-no-files-found: ignore

    - name: Update badge
      if: inputs.badge-api-url != ''
      shell: bash
      env:
        BADGE_API_URL: ${{ inputs.badge-api-url }}
        BADGE_API_TOKEN: ${{ inputs.badge-api-token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        TOTAL_STALE: ${{ steps.check.outputs.total-stale }}
        DRIFT_SCORE: ${{ steps.check.outputs.drift-score }}
      run: |
        PAYLOAD=$(jq -n \
          --argjson total_stale "${TOTAL_STALE:-0}" \
          --argjson drift_score "${DRIFT_SCORE:-0}" \
          --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          '{"total_stale": $total_stale, "drift_score": $drift_score, "timestamp": $timestamp}')
        curl -sf -X POST \
          "${BADGE_API_URL}/badge/${OWNER}/${REPO}" \
          -H "Authorization: Bearer ${BADGE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          || echo "::warning::Failed to update badge (non-fatal)"
